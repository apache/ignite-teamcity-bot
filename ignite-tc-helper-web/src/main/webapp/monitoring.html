<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apache Ignite Teamcity Bot - Server monitoring page</title>

    <link rel="icon" href="img/leaf-icon-png-7066.png">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="css/style-1.5.css">

    <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

    <script src="js/common-1.6.js"></script>
    <script src="js/testfails-2.2.js"></script>
</head>
<body>
<script>
    $(document).ready(function() {
        $.getScript("js/common-1.6.js", function(data, textStatus, jqxhr){ });

        $( document ).tooltip();

        loadData();
    });

    function loadPofilingData() {
        $.ajax({
            url: "rest/monitoring/profiling",
            success: function (result) {
                $("#loadStatus").html("");

                showProfiling(result);
            },
            error: showErrInLoadStatus
        });
    }

    function loadData() {
        $("#loadStatus").html("&#8987; Please wait");
        $.ajax({
            url: "rest/branches/version",
            success: showVersionInfo,
            error: showErrInLoadStatus
        });

        $.ajax({
            url: "rest/monitoring/tasks",
            success: function(result) {
                $("#loadStatus").html("");

                showTasks(result);
            },
            error: showErrInLoadStatus
        });

        $.ajax({
            url: "rest/monitoring/appLogSummaryLink",
            success: showAppLogSummaryLink,
            error: showErrInLoadStatus
        });

        loadPofilingData();

        $.ajax({
            url: "rest/monitoring/cacheMetrics",
            success: function(result) {
                $("#loadStatus").html("");

                showCacheMetrics(result);
            },
            error: showErrInLoadStatus
        });
    }

    /**
     * @param result org.apache.ignite.ci.web.rest.monitoring.TaskResult
     */
    function showTasks(result) {
        var res = "<table class='stat'>" ;
        res += "<tr>";
        res += "<th>Name</th>";
        res += "<th>Start</th>";
        res += "<th>Count</th>";
        res += "<th>End</th>";
        res += "<th>Result</th>";
        res += "<th>Actions</th>";
        res += "</tr>";
        for (var i = 0; i < result.length; i++) {
            var task = result[i];
            var logUrl = "monitoring-log.html?startTs=" + encodeURIComponent(task.startTs)
                + "&endTs=" + encodeURIComponent(task.endTs || 0)
                + "&name=" + encodeURIComponent(task.name);

            res += "<tr>";
            res += "<td>" + escapeHtml(task.name) + "</td>";
            res += "<td>" + escapeHtml(task.start) + "</td>";
            res += "<td>" + escapeHtml(task.count) + "</td>";
            res += "<td>" + escapeHtml(task.end) + "</td>";
            res += "<td>" + escapeHtml(task.result) + "</td>";
            res += "<td><a target='_blank' href='" + logUrl + "'>Warnings/errors</a></td>";
            res += "</tr>";
        }
        res += "</table>";
        $("#tasks").html(res);
    }

    function showAppLogSummaryLink(result) {
        var logUrl = "monitoring-log.html?startTs=" + encodeURIComponent(result.startTs)
            + "&endTs=0"
            + "&name=" + encodeURIComponent(result.name);

        $("#appLogSummary").html("<a target='_blank' href='" + logUrl + "'>Application warnings/errors since start</a>");
    }

    /**
     * @param result org.apache.ignite.ci.web.rest.monitoring.HotSpot
     */
    function showProfiling(result) {
        var res = "<table class='stat'>" ;
        res += "<tr>";
        res += "<th>Name</th>";
        res += "<th>Duration</th>";
        res += "<th>Count</th>";
        res += "<th>Avg.Duration</th>";
        res += "</tr>";
        for (var i = 0; i < result.length; i++) {
            var inv = result[i];
            res += "<tr>";
            res += "<td>" + escapeHtml(inv.method) + "</td>";
            res += "<td>" + escapeHtml(inv.duration) + "</td>";
            res += "<td>" + escapeHtml(inv.count) + "</td>";
            res += "<td>" + escapeHtml(inv.avgDuration) + "</td>";
            res += "</tr>";
        }
        res += "</table>";
        $("#profiling").html(res);
    }

    function showCacheMetrics(result) {
        var res = "<table class='stat'>" ;
        res += "<tr>";
        res += "<th>Name</th>";
        res += "<th>Size</th>";
        res += "<th>Parts</th>";
        res += "</tr>";
        for (var i = 0; i < result.length; i++) {
            var inv = result[i];
            res += "<tr>";
            res += "<td>" + escapeHtml(inv.name) + "</td>";
            res += "<td>" + escapeHtml(inv.size) + "</td>";
            res += "<td>" + escapeHtml(inv.parts) + "</td>";
            res += "</tr>";
        }
        $("#caches").html(res);
    }

    function resetProfiling() {
        $.ajax({
            url: "rest/monitoring/resetProfiling",
            method: "post",
            success: function(result) {
                loadPofilingData();
            },
            error: showErrInLoadStatus
        });
    }

    function testSlackNotification() {
        $.ajax({
            url: "rest/monitoring/testSlackNotification",
            method: "post",
            success: function(result) {
                alert(JSON.stringify(result));
            },
            error: function(result) {
                alert(JSON.stringify(result));
            }
        });

        return false;
    }

    function testEmailNotification() {
        $.ajax({
            url: "rest/monitoring/testEmailNotification",
            method: "post",
            data: $("#emailForm").serialize(),
            success: function(result) {
                alert(JSON.stringify(result));
            },
            error: function(result) {
                alert(JSON.stringify(result));
            }
        });

        return false;
    }

    function escapeHtml(str) {
        return String(str || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

</script>

Tasks Monitoring Data:
<div id="appLogSummary" style="font-family: monospace"></div>
<div id="tasks" style="font-family: monospace"></div>
<br>

<hr>
<b>Method Profiling Data:</b> <button onclick="resetProfiling()">Reset</button>
<div id="profiling" style="font-family: monospace"></div>
<br>

<hr>
<b>Ignite Caches Data:</b>
<div id="caches" style="font-family: monospace"></div>

<br>

<hr>
<b>Test Slack notification:</b> <button onclick="testSlackNotification()">Send</button>
<b>Test Email notification:</b>

<form id="emailForm"><b>Email Address:</b>
    <input type="text" placeholder="Enter Address" name="address" required>
</form>

<button onclick="testEmailNotification()">Send</button>

<br>

<div id="loadStatus"></div>
<div id="version"></div>

</body>
</html>
